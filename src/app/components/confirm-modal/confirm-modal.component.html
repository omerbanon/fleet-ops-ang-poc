<div class="modal-backdrop" (click)="cancel.emit()">
  <div class="modal-card animate-scale-in" (click)="$event.stopPropagation()">
    <h3 class="modal-title">{{ title() }}</h3>
    <p class="modal-message">{{ message() }}</p>
    <div class="modal-actions">
      <ion-button
        fill="solid"
        [color]="confirmColor()"
        (click)="confirm.emit()"
      >
        {{ confirmText() }}
      </ion-button>
      <ion-button
        fill="outline"
        color="medium"
        (click)="cancel.emit()"
      >
        ביטול
      </ion-button>
    </div>
  </div>
</div>

@if (missions().length === 0) {
  <div class="empty-state">
    <svg width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
      <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
    </svg>
    <p class="empty-title">אין משימות</p>
    <p class="empty-subtitle">צור משימה חדשה כדי להתחיל</p>
  </div>
} @else {
  <div class="mission-groups">
    @for (group of groups; track group.date) {
      <div class="date-group">
        <h3 class="date-header">{{ group.label }}</h3>
        <div class="group-missions">
          @for (mission of group.missions; track mission.id) {
            <app-mission-card
              [mission]="mission"
              [isExpanded]="expandedMissionId() === mission.id"
              (toggle)="onToggle(mission.id)"
              (startMission)="onStart(mission)"
              (completeMission)="onComplete(mission)"
              (cancelMission)="onCancel(mission)"
            />
          }
        </div>
      </div>
    }
  </div>
}
